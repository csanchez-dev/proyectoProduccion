networks:
  coniiti-net:
    driver: bridge

services:
  # ===================================================================
  # NGINX — UNIFIED REVERSE PROXY / LOAD BALANCER
  # ===================================================================
  nginx:
    image: nginx:alpine
    container_name: coniiti-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"           # HTTP principal
      - "443:443"         # HTTPS (preparado)
    networks:
      - coniiti-net
    restart: unless-stopped
    depends_on:
      - frontend-app
      - backend
    deploy:
      resources:
        limits:
          memory: 100M

  # ===================================================================
  # BASES DE DATOS
  # ===================================================================
  postgres:
    image: postgres:15
    container_name: coniiti-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: coniiti_main
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Si ya tienes Postgres local en el host usando 5432, usa 5433 para el contenedor.
      - "5433:5432"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  notification-postgres:
    image: postgres:16
    container_name: coniiti-notification-postgres
    environment:
      POSTGRES_USER: notifications_user
      POSTGRES_PASSWORD: notifications_pass
      POSTGRES_DB: notifications_db
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 150M

  # ===================================================================
  # REDIS
  # ===================================================================
  redis:
    image: redis:7-alpine
    container_name: coniiti-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M

  # ===================================================================
  # RABBITMQ
  # ===================================================================
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: coniiti-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-changeme_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme_pass}
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ===================================================================
  # MICROSERVICIOS
  # ===================================================================
  auth-service:
    build: ./services/auth-service
    container_name: coniiti-auth
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/coniiti_main?schema=public"
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-changeme_user}:${RABBITMQ_PASS:-changeme_pass}@rabbitmq:5672
      NODE_OPTIONS: "--max-old-space-size=128"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  agenda-service:
    build: ./services/agenda-service
    container_name: coniiti-agenda
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/coniiti_main?schema=public"
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      NODE_OPTIONS: "--max-old-space-size=128"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  inscription-service:
    build: ./services/inscription-service
    container_name: coniiti-inscription
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/coniiti_main?schema=public"
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-changeme_user}:${RABBITMQ_PASS:-changeme_pass}@rabbitmq:5672
      NODE_OPTIONS: "--max-old-space-size=128"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  notification-service:
    build: ./services/notification-service
    container_name: coniiti-notification
    environment:
      PORT: 4000
      DB_HOST: notification-postgres
      DB_PORT: 5432
      DB_USER: notifications_user
      DB_PASSWORD: notifications_pass
      DB_NAME: notifications_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-changeme_user}:${RABBITMQ_PASS:-changeme_pass}@rabbitmq:5672
      NODE_OPTIONS: "--max-old-space-size=128"
    depends_on:
      notification-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  # ===================================================================
  # BACKEND GATEWAY
  # ===================================================================
  backend:
    build: ./services/backend
    container_name: coniiti-backend-gateway
    environment:
      PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:3000
      AGENDA_SERVICE_URL: http://agenda-service:3001
      INSCRIPTION_SERVICE_URL: http://inscription-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:4000
      NODE_OPTIONS: "--max-old-space-size=128"
    depends_on:
      - auth-service
      - agenda-service
      - inscription-service
      - notification-service
      - rabbitmq
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  # ===================================================================
  # FRONTEND
  # ===================================================================
  frontend-app:
    build: ./frontend/vite-project
    container_name: coniiti-frontend
    depends_on:
      - backend
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M

  # ===================================================================
  # MONITORING
  # ===================================================================
  loki:
    image: grafana/loki:2.9.0
    container_name: coniiti-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  promtail:
    image: grafana/promtail:2.9.0
    container_name: coniiti-promtail
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M

  grafana:
    image: grafana/grafana:10.1.0
    container_name: coniiti-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki
    networks:
      - coniiti-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

volumes:
  postgres_data:
  notification-postgres-data:
  redis_data:
  loki_data:
  grafana_data:
