services:
  # ─────────────────────────────────────────
  # BACKEND — Express + TypeScript + Node.js
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-2026-backend
    runtime: node
    plan: free
    rootDir: services/backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.20.4
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RABBITMQ_URL
        fromService:
          type: web
          name: coniiti-rabbitmq
          property: host
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: coniiti-auth-service
          property: host
      - key: AGENDA_SERVICE_URL
        fromService:
          type: web
          name: coniiti-agenda-service
          property: host
      - key: INSCRIPTION_SERVICE_URL
        fromService:
          type: web
          name: coniiti-inscription-service
          property: host

  # ─────────────────────────────────────────
  # AUTH SERVICE
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-auth-service
    runtime: node
    plan: free
    rootDir: services/auth-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false

  # ─────────────────────────────────────────
  # AGENDA SERVICE
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-agenda-service
    runtime: node
    plan: free
    rootDir: services/agenda-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false

  # ─────────────────────────────────────────
  # INSCRIPTION SERVICE
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-inscription-service
    runtime: node
    plan: free
    rootDir: services/inscription-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE — Consumer
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-notification-service
    runtime: node
    plan: free
    rootDir: services/notification-service
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: RABBITMQ_URL
        fromService:
          type: web
          name: coniiti-rabbitmq
          property: host

  # ─────────────────────────────────────────
  # RABBITMQ — Message Broker
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-rabbitmq
    runtime: docker
    plan: free
    # Usamos la imagen oficial de RabbitMQ
    dockerContext: .
    dockerfilePath: services/backend/rabbitmq.Dockerfile # Ruta actualizada
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: user
      - key: RABBITMQ_DEFAULT_PASS
        value: password

  # ─────────────────────────────────────────
  # FRONTEND — React + Vite (Static Site)
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-2026-frontend
    runtime: static
    plan: free
    rootDir: frontend/vite-project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://coniiti-2026-backend.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
