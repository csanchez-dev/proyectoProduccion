services:
  # ─────────────────────────────────────────
  # BACKEND — Express + TypeScript + Node.js
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-2026-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.20.4
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # ─────────────────────────────────────────
  # FRONTEND — React + Vite (Static Site)
  # ─────────────────────────────────────────
  - type: web
    name: coniiti-2026-frontend
    runtime: static
    plan: free
    rootDir: frontend/vite-project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://coniiti-2026-backend.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

