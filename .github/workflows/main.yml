name: Prueba de Conexion Azure
on:
  push:
    branches: [ main, desarrollo-diseño ] # Se activa en main y desarrollo-diseño

jobs:
  test-azure-login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Login en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validar acceso
        run: |
          az account show
          az acr list --output table
