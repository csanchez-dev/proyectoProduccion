name: Pipeline CONIITI

on:
  push:
    branches: [main]

jobs:
  construir-y-probar:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar el codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        
        with:
          node-version: 18
      
      - name: 3. Isntalar dependencias de node
        run: npm install

      