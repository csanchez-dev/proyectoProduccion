apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend-container
        image: frontend-app:v1
        imagePullPolicy: Never # Importante si usas un cluster local en Codespaces
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend-web
  ports:
    - protocol: TCP
      port: 80         # Puerto del servicio
      targetPort: 80    # El puerto que EXPOSE tu Dockerfile (Nginx)
      nodePort: 30001   # El puerto externo