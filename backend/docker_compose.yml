version: "4"
services:
    mi_app:
      build: .
      ports:
        - "3000:3000"

      links:
        - postgres
        - rabbitmq

    postgres:
     image: postgres:17.9
     ports:
       - "5432:5432"
     volumes:
       - postgres-data:/var/lib/postgresql/data

    rabbitmq:
      image: rabbitmq:4.0-management
      ports:
        - "5672:5672"
        - "15672:15672"
      environment:
        RABBITMQ_DEFAULT_USER: user
        RABBITMQ_DEFAULT_PASS: password

    frontend-app:
      build: ../frontend/vite-project
      ports:
        - "5173:80"
      depends_on:
        - api-gateway

    api-gateway:
      image: nginx:latest
      ports:
        - "8080:80"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
        - mi_app
        - rabbitmq

volumes:
  postgres-data:
