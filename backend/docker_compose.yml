version: '3.8'

networks:
  coniiti-net:
    driver: bridge

services:
  # === BASES DE DATOS ===
  postgres:
    image: postgres:15
    container_name: coniiti-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: coniiti_main
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # opcional, solo para debug
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-postgres:
    image: postgres:16
    container_name: coniiti-notification-postgres
    environment:
      POSTGRES_USER: notifications_user
      POSTGRES_PASSWORD: notifications_pass
      POSTGRES_DB: notifications_db
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === REDIS ===
  redis:
    image: redis:7-alpine
    container_name: coniiti-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === RABBITMQ (puertos de Julián para evitar conflictos) ===
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: coniiti-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - coniiti-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === MICROSERVICIOS ===
  auth-service:
    build: ./services/auth-service
    container_name: coniiti-auth
    env_file:
      - .env.auth
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped

  agenda-service:
    build: ./services/agenda-service
    container_name: coniiti-agenda
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped

  inscription-service:
    build: ./services/inscription-service
    container_name: coniiti-inscription
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_URL: amqp://user:password@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coniiti-net
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: coniiti-notification
    environment:
      PORT: 4000
      DB_HOST: notification-postgres
      DB_PORT: 5432
      DB_USER: notifications_user
      DB_PASSWORD: notifications_pass
      DB_NAME: notifications_db
      RABBITMQ_URL: amqp://rabbitmq:5672

  api-gateway:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Si tienes el frontend buildido, descomenta la siguiente línea:
      # - ./frontend/vite-project/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - agenda-service
      - inscription-service
      - notification-service

volumes:
  postgres_data:
  notification-postgres-data:
  redis_data:
  loki_data:
  grafana_data: