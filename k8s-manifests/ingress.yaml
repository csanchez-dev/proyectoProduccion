apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coniiti-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: coniiti.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-gateway
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
