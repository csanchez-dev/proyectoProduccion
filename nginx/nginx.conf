events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Timeouts
    keepalive_timeout  65;

    # Compresión Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Definición de Upstreams
    upstream backend_gateway {
        server backend:3000;
    }

    upstream frontend_app {
        server frontend-app:80;
    }

    server {
        listen 80;
        server_name localhost;

        # Logs de acceso y error
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Enrutamiento de la API
        location /api/ {
            proxy_pass http://backend_gateway/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Enrutamiento del Frontend (SPA)
        location / {
            proxy_pass http://frontend_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Soporte para rutas de React/Vite (si es necesario)
            try_files $uri $uri/ /index.html;
        }

        # Dashboard / Health (Simulación)
        location /health {
            return 200 'Nginx is healthy';
            add_header Content-Type text/plain;
        }
    }
}
