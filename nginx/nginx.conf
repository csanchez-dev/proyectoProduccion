worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Ocultar versión de Nginx
    server_tokens off;

    # Configuración de Rate Limiting a nivel de Proxy
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream frontend_server {
        server frontend-app:5173;
    }

    upstream backend_gateway_server {
        server backend:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Cabeceras de seguridad globales
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http: https:;" always;

        location / {
            proxy_pass http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }

        location /api {
            # Aplicar Rate Limiting
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://backend_gateway_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}